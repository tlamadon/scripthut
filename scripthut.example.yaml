# ScriptHut Configuration
# Copy this file to scripthut.yaml and customize for your environment

# Remote backends to monitor
backends:
  # Slurm cluster example
  - name: hpc-cluster
    type: slurm
    ssh:
      host: slurm-login.cluster.edu
      port: 22
      user: your_username
      key_path: ~/.ssh/id_rsa
      # cert_path: ~/.ssh/id_rsa-cert.pub  # Optional: for certificate-based auth
      # known_hosts: ~/.ssh/known_hosts    # Optional: enable host key checking
    account: pi-faculty  # Slurm account for job submission (e.g., phd, pi-faculty)
    # login_shell: true  # Use #!/bin/bash -l to source .bash_profile in jobs
    # clone_dir: ~/scripthut-repos  # Path whose disk usage is shown in the UI (default)

  # Multiple backends can be defined
  # - name: secondary-cluster
  #   type: slurm
  #   ssh:
  #     host: slurm2.cluster.edu
  #     user: your_username
  #     key_path: ~/.ssh/cluster2_key
  #   account: phd  # Slurm account for this backend

  # ECS backend example (not yet implemented)
  # - name: production-ecs
  #   type: ecs
  #   aws:
  #     profile: my-aws-profile  # AWS CLI profile name
  #     region: us-east-1
  #     cluster_name: my-ecs-cluster

  # AWS Batch backend example
  # Requires: pip install 'scripthut[batch]' (installs boto3)
  # AWS credentials come from the standard AWS credential chain.
  #
  # Option 1a: pre-registered JD, locked mode (simplest).
  # Scripthut skips RegisterJobDefinition — avoids the cross-account
  # iam:PassRole error. The container image is locked to whatever the JD
  # was registered with; per-task `image:` values are ignored with a warning.
  # - name: aws-batch
  #   type: batch
  #   aws:
  #     profile: my-aws-profile                    # optional; omit to use default chain
  #     region: us-east-1
  #     job_queue: my-batch-queue                  # default queue; task.partition overrides
  #   job_definition: simpleJobDef-b760b37         # existing JD name, name:revision, or ARN
  #   job_definition_mode: locked                   # default — image locked to the JD
  #   retry_attempts: 1                             # Batch retryStrategy.attempts (1-10)
  #   log_group: /aws/batch/job                    # CloudWatch log group (default)
  #   max_concurrent: 50
  #
  # Option 1b: pre-registered JD, revisions mode (per-image).
  # Scripthut uses the configured JD as a template. When a task needs a
  # different image, scripthut clones the template's containerProperties
  # (roles, log config, retry, tags preserved), swaps in the new image,
  # and registers a new revision via RegisterJobDefinition. Cached per image.
  # Requires batch:RegisterJobDefinition and batch:DescribeJobDefinitions.
  # - name: aws-batch
  #   type: batch
  #   aws:
  #     region: us-east-1
  #     job_queue: my-batch-queue
  #   job_definition: simpleJobDef-b760b37         # template
  #   job_definition_mode: revisions               # register new revisions per image
  #   retry_attempts: 1
  #   max_concurrent: 50
  #
  # Option 2: let scripthut auto-register a job definition per image.
  # The calling principal must be able to iam:PassRole on job/exec roles
  # in the SAME AWS account as the credentials.
  # - name: aws-batch
  #   type: batch
  #   aws:
  #     region: us-east-1
  #     job_queue: my-batch-queue
  #   default_image: ghcr.io/my-org/workflow:latest
  #   job_role_arn: arn:aws:iam::123456789012:role/BatchJobRole       # optional
  #   execution_role_arn: arn:aws:iam::123456789012:role/BatchExec    # optional
  #   retry_attempts: 1
  #   log_group: /aws/batch/job
  #   max_concurrent: 50
  #
  # AWS EC2-direct backend example.
  # Launches one EC2 instance per task; scripthut connects via SSH tunnelled
  # through SSM Session Manager (no inbound port 22, no EC2 key pair needed).
  # Requires: pip install 'scripthut[batch]' and `session-manager-plugin` on PATH.
  # - name: aws-ec2
  #   type: ec2
  #   aws:
  #     profile: scripthut
  #     region: us-east-2
  #   ami: ami-0abc123...                     # needs sshd + SSM Agent + docker
  #   subnet_id: subnet-0abc...
  #   security_group_ids: [sg-0abc...]        # inbound port 22 NOT required
  #   instance_types:
  #     default: c5.xlarge                    # maps task.partition -> instance type
  #     gpu: g4dn.xlarge
  #   default_image: ghcr.io/my-org/workflow:latest
  #   instance_profile_arn: arn:aws:iam::123456789012:instance-profile/ScriptHutTask
  #   ssh_user: ec2-user                      # "ubuntu" for Ubuntu AMIs
  #   max_instances: 20                       # hard cap on concurrent instances
  #   idle_terminate_seconds: 1800            # safety shutdown slack past time_limit
  #   tag_prefix: scripthut                   # used by the startup reconciler
  #   extra_tags:
  #     Environment: research

  # Notes on AWS Batch behaviour:
  #   - task.partition maps to a Batch job queue; if unset, aws.job_queue is used.
  #   - task.cpus / task.memory / task.gres map to containerOverrides.resourceRequirements.
  #   - task.time_limit maps to timeout.attemptDurationSeconds (min 60s).
  #   - Env vars are passed via containerOverrides.environment so the container
  #     entrypoint sees them at start time (not as `export` lines inside the script).
  #   - Tasks can specify `image:` per-task; otherwise `default_image` is used.
  #     When `job_definition` is set, the image is locked to that JD — task.image
  #     mismatches trigger a warning and the JD's image wins.
  #   - Git-based workflows pass the commit SHA via env vars so the container
  #     can clone+checkout at runtime (no shared filesystem).
  #   - Logs are read from CloudWatch Logs; stdout and stderr are merged into
  #     the same stream (view the "output" tab).

# Sources: git repos or backend paths containing workflow JSON files
# Files matching the workflows_glob pattern (default: .hut/workflows/*.json) are discovered as workflows.
sources:
  # Git source — repo is cloned on the backend, workflows discovered via glob pattern
  # Tasks run inside the cloned directory (like git-based workflows).
  - name: ml-jobs
    type: git
    url: git@github.com:your-org/ml-pipelines.git
    branch: main
    deploy_key: ~/.ssh/ml-jobs-deploy-key
    backend: hpc-cluster
    # workflows_glob: "**/*.hut.json"  # default: .hut/workflows/*.json
    # clone_dir: ~/scripthut-repos     # default — clones to <clone_dir>/<commit_hash>/
    # postclone: "rm -rf large_files"  # optional — run after cloning

  # Path source — directory on the backend, workflows discovered via SSH
  # - name: shared-workflows
  #   type: path
  #   path: /shared/project-workflows
  #   backend: hpc-cluster
  #   # workflows_glob: "**/*.hut.json"  # default: .hut/workflows/*.json

# Coding agents — the "Start coding agent" button on each git source launches a
# Claude Code session as a job, in a fresh writable clone of the repo. Two modes:
#   - Remote (claude.ai):  runs `claude remote-control`; you drive it from the web.
#   - Browser TUI:         runs the interactive `claude` TUI in ScriptHut's terminal.
#
# AUTH (one setup covers both modes): run `claude auth login` once on a node that
# shares $HOME with the compute nodes (typical NFS) so the credential at
# ~/.claude/.credentials.json is visible to the job. Remote mode REQUIRES this
# full-scope login (the inference-only CLAUDE_CODE_OAUTH_TOKEN is rejected).
# Browser TUI also works with this login; it additionally accepts an
# ANTHROPIC_API_KEY if you prefer (optional, TUI only).
#
# Branch push + PRs are driven by the agent via local git/gh, so the job also
# needs a writable remote and a GH_TOKEN. Supply tokens via an env_group named
# in `env_group` below (these are ordinary env rules — no special secret store).
#
# CLAUDE ON THE NODES: `claude` must be on PATH on the compute nodes. If it isn't,
# the agent job reports a clear "claude not found …" message (Remote mode fails;
# Browser TUI drops you into a shell so you can fix it in place). The cleanest way
# to guarantee it is an env_group `init:` that activates a conda env containing it
# — `init` runs in the job before the agent starts, so it works for both modes.
# See the `claude-env` group below; reference it via `agent.env_group`.
# agent:
#   # remote_command: "claude remote-control --name {name} --capacity 1"
#   # tui_command: "claude"
#   cpus: 2
#   memory: 8G
#   time_limit: "12:00:00"
#   # partition: gpu              # default: the task default ("normal")
#   env_group: claude-env         # env_group applied to the agent task (creds + claude)
#   # clone_full_history: true    # full clone so the agent can branch/commit/push
#
# env_groups:
#   claude-env:
#     - set:
#         GH_TOKEN: "${GH_TOKEN}"            # for `gh pr create` + authenticated push
#         # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"   # optional, Browser TUI only
#     # Ensure `claude` is on PATH, bootstrapping a conda env on first use.
#     # Idempotent: if claude already resolves, this is a no-op. Requires conda
#     # and outbound network on the node for the one-time create/install.
#     - init: |
#         if ! command -v claude >/dev/null 2>&1; then
#           source "$(conda info --base)/etc/profile.d/conda.sh"
#           conda activate scripthut-claude 2>/dev/null || {
#             conda create -y -n scripthut-claude 'nodejs>=18'
#             conda activate scripthut-claude
#             npm install -g @anthropic-ai/claude-code
#           }
#         fi
#     # Or, if you already have a conda env with claude, just activate it:
#     # - init: |
#     #     source "$(conda info --base)/etc/profile.d/conda.sh"
#     #     conda activate my-claude-env

# Workflows for batch job submission
# These are SSH commands that return JSON task lists
# Trigger them via the UI to create a queue of jobs
workflows:
  # Example: ML training pipeline
  - name: ml-training
    backend: hpc-cluster          # Which backend to submit jobs to
    command: "python /shared/scripts/get_training_tasks.py"
    max_concurrent: 5             # Max jobs running at once
    description: "ML model training pipeline"

  # Example: Git workflow — clones a repo on the backend, then runs the command
  # inside the cloned directory to generate the task list
  # - name: ml-training-git
  #   backend: hpc-cluster
  #   git:
  #     repo: git@github.com:your-org/ml-pipelines.git
  #     branch: main
  #     deploy_key: ~/.ssh/ml-deploy-key  # local path, uploaded to backend temporarily
  #     clone_dir: ~/scripthut-repos      # parent dir on the backend (default: ~/scripthut-repos)
  #   command: "python get_tasks.py"
  #   max_concurrent: 5
  #   description: "ML training from git repo (clones on backend)"

  # Example: Data processing batch
  # - name: data-processing
  #   backend: hpc-cluster
  #   command: "cat /shared/tasks/data_pipeline.json"
  #   max_concurrent: 10
  #   description: "Daily data processing batch"

# Workflow commands must return JSON in this format:
# {
#   "tasks": [
#     {
#       "id": "task-001",
#       "name": "train-model-v1",
#       "command": "python train.py --config config.yaml",
#       "working_dir": "/home/user/project",
#       "partition": "gpu",
#       "cpus": 4,
#       "memory": "16G",
#       "time_limit": "4:00:00",
#       "output_file": "/path/to/custom/output.log",  # Optional: custom stdout path
#       "error_file": "/path/to/custom/error.log",    # Optional: custom stderr path
#       "env_vars": {"MY_PARAM": "42", "DATA_DIR": "/scratch/data"}  # Optional: per-task env vars
#     }
#   ]
# }
#
# If output_file/error_file are not specified, logs will be written to:
#   /tmp/scripthut/{queue_id}/{task_id}.out
#   /tmp/scripthut/{queue_id}/{task_id}.err

# Global settings
settings:
  # How often to poll for job updates (seconds, minimum 5)
  poll_interval: 60

  # Web server binding
  server_host: 127.0.0.1
  server_port: 8000

  # Directory to cache cloned repositories
  sources_cache_dir: ~/.cache/scripthut/sources

  # Filter jobs by username (shows toggle button in UI)
  # Set to your username to enable "My Jobs" filter
  filter_user: your_username

  # What the CLI does when no server is configured and no local daemon is
  # running: "ask" prompts on a TTY (fails in scripts), "always" starts a
  # daemon without asking, "never" neither prompts nor starts one.
  # cli_autostart: ask

# -----------------------------------------------------------------------------
# Task result cache (optional)
# -----------------------------------------------------------------------------
# When enabled, a task that declares `outputs` is content-addressed by a key
# derived from its command, resolved environment, git commit, and the hashes
# of its declared `inputs`. If a previous run produced the same key, scripthut
# restores that run's output artifacts onto the backend instead of resubmitting
# the job.
#
# How it works: hashing and artifact transfer run cluster-side over SSH (so the
# chosen `tool` must be on the backend's PATH). The authoritative copy of files
# lives on the cluster; the object store below is the durable, shared tier.
# Keyed by an input/action hash; blobs are stored content-addressed (so
# identical outputs upload once and are reused across runs, branches, clusters).
# SSH backends only (Slurm/PBS) — API-only backends silently skip caching.
#
# cache:
#   enabled: true
#   # Base URI of the object store. For tool=aws an S3 URI; for tool=rclone an
#   # rclone remote. Entries live under <store>/ac/ (manifests) and
#   # <store>/cas/ (artifact blobs).
#   store: s3://my-bucket/scripthut-cache
#   tool: aws            # "aws" (aws s3 cp/ls) or "rclone" (cat/rcat/copyto/lsf)
#
# Per task (in a workflow JSON), declare what to hash and what to cache:
#   {
#     "id": "train",
#     "command": "python train.py --config base.yaml",
#     "inputs":  ["data/train.parquet", "base.yaml"],  # content feeds the key
#     "outputs": ["models/model.pt"],                   # restored on a hit
#     "cache":   true                                   # default; false opts out
#   }
