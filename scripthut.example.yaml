# ScriptHut Configuration
# Copy this file to scripthut.yaml and customize for your environment

# Remote backends to monitor
backends:
  # Slurm cluster example
  - name: hpc-cluster
    type: slurm
    ssh:
      host: slurm-login.cluster.edu
      port: 22
      user: your_username
      key_path: ~/.ssh/id_rsa
      # cert_path: ~/.ssh/id_rsa-cert.pub  # Optional: for certificate-based auth
      # known_hosts: ~/.ssh/known_hosts    # Optional: enable host key checking
    account: pi-faculty  # Slurm account for job submission (e.g., phd, pi-faculty)
    login_shell: true  # Use #!/bin/bash -l to source .bash_profile in jobs
    environments:
      - name: python
        extra_init: "module load python/3.12"    # adjust to your cluster's module
      - name: R
        extra_init: "module load R/4.5"          # e.g., R/4.4/4.4.3 on some clusters
      - name: julia
        extra_init: "module load julia/1.12"
      # - name: conda-env
      #   extra_init: |
      #     module load conda/23.10
      #     conda activate my-env

  # Multiple backends can be defined
  # - name: secondary-cluster
  #   type: slurm
  #   ssh:
  #     host: slurm2.cluster.edu
  #     user: your_username
  #     key_path: ~/.ssh/cluster2_key
  #   account: phd  # Slurm account for this backend

  # ECS backend example (not yet implemented)
  # - name: production-ecs
  #   type: ecs
  #   aws:
  #     profile: my-aws-profile  # AWS CLI profile name
  #     region: us-east-1
  #     cluster_name: my-ecs-cluster

# Sources: git repos or backend paths containing workflow JSON files
# Files matching the workflows_glob pattern are discovered as triggerable workflows.
# Click "Sync" on the Sources page to pull the latest, then "Run" to submit.
sources:
  # scripthut-examples — ready-to-run examples in Python, R, Julia, and Apptainer
  # Public repo, no deploy key needed. Workflows are auto-discovered via the glob.
  # See: https://github.com/thomaswiemann/scripthut-examples
  - name: scripthut-examples
    type: git
    url: https://github.com/thomaswiemann/scripthut-examples.git
    branch: main
    backend: hpc-cluster
    workflows_glob: "**/*.json"  # discovers all JSON workflow files recursively

  # Private repo example — uses a deploy key for authentication
  # - name: my-pipelines
  #   type: git
  #   url: git@github.com:your-org/ml-pipelines.git
  #   branch: main
  #   deploy_key: ~/.ssh/ml-jobs-deploy-key
  #   backend: hpc-cluster
  #   # workflows_glob: ".hut/workflows/*.json"  # default pattern
  #   # clone_dir: ~/scripthut-repos               # default
  #   # postclone: "rm -rf large_files"            # optional post-clone command

  # Path source — point at a directory already on the cluster (no git needed).
  # ScriptHut discovers workflow JSON files via SSH using the glob pattern.
  # Great for repos you clone yourself, shared project directories, etc.
  # - name: my-project
  #   type: path
  #   path: ~/my-project                           # any path on the backend
  #   backend: hpc-cluster
  #   workflows_glob: "**/*.json"                   # same glob as git sources

# Standalone workflows (alternative to sources)
# These define an SSH command that returns a JSON task list.
# Most users should prefer sources (above) for git-based workflows.
workflows: []
  # - name: quick-test
  #   backend: hpc-cluster
  #   git:
  #     repo: git@github.com:your-org/ml-pipelines.git
  #     branch: main
  #     deploy_key: ~/.ssh/ml-deploy-key  # local path, uploaded to backend temporarily
  #     clone_dir: ~/scripthut-repos      # parent dir on the backend (default: ~/scripthut-repos)
  #   command: "python get_tasks.py"
  #   max_concurrent: 5
  #   description: "ML training from git repo (clones on backend)"

  # Example: Data processing batch
  # - name: data-processing
  #   backend: hpc-cluster
  #   command: "cat /shared/tasks/data_pipeline.json"
  #   max_concurrent: 10
  #   description: "Daily data processing batch"

# Workflow commands must return JSON in this format:
# {
#   "tasks": [
#     {
#       "id": "task-001",
#       "name": "train-model-v1",
#       "command": "python train.py --config config.yaml",
#       "working_dir": "/home/user/project",
#       "partition": "gpu",
#       "cpus": 4,
#       "memory": "16G",
#       "time_limit": "4:00:00",
#       "output_file": "/path/to/custom/output.log",  # Optional: custom stdout path
#       "error_file": "/path/to/custom/error.log",    # Optional: custom stderr path
#       "env_vars": {"MY_PARAM": "42", "DATA_DIR": "/scratch/data"}  # Optional: per-task env vars
#     }
#   ]
# }
#
# If output_file/error_file are not specified, logs will be written to:
#   /tmp/scripthut/{queue_id}/{task_id}.out
#   /tmp/scripthut/{queue_id}/{task_id}.err

# Global settings
settings:
  # How often to poll for job updates (seconds, minimum 5)
  poll_interval: 60

  # Web server binding
  server_host: 127.0.0.1
  server_port: 8000

  # Directory to cache cloned repositories
  sources_cache_dir: ~/.cache/scripthut/sources

  # Filter jobs by username (shows toggle button in UI)
  # Set to your username to enable "My Jobs" filter
  filter_user: your_username
