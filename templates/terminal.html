<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptHut - Terminal ({{ backend_name }})</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='25' cy='2' r='1.8' fill='%23ccc' opacity='.5'/%3E%3Ccircle cx='23' cy='5' r='2.2' fill='%23bbb' opacity='.45'/%3E%3Ccircle cx='25.5' cy='8' r='1.8' fill='%23aaa' opacity='.4'/%3E%3Crect x='22' y='7' width='2.5' height='8' fill='%23696969'/%3E%3Cpolygon points='16,3 0,22 32,22' fill='%23B8860B'/%3E%3Cline x1='16' y1='3' x2='3' y2='22' stroke='%23A07000' stroke-width='.7'/%3E%3Cline x1='16' y1='3' x2='9' y2='22' stroke='%23A07000' stroke-width='.7'/%3E%3Cline x1='16' y1='3' x2='16' y2='22' stroke='%23A07000' stroke-width='.7'/%3E%3Cline x1='16' y1='3' x2='23' y2='22' stroke='%23A07000' stroke-width='.7'/%3E%3Cline x1='16' y1='3' x2='29' y2='22' stroke='%23A07000' stroke-width='.7'/%3E%3Crect x='6' y='22' width='20' height='8' fill='%23D2B48C'/%3E%3Crect x='12' y='24' width='6' height='6' rx='3' ry='2' fill='%235C3317'/%3E%3Crect x='20' y='25' width='3' height='3' fill='%2387CEEB' stroke='%235C3317' stroke-width='.5'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
    <style>
        #terminal-container {
            height: calc(100vh - 3.5rem);
        }
        #terminal-container .xterm {
            height: 100%;
            padding: 4px;
        }
    </style>
</head>

<body class="bg-black m-0 p-0 overflow-hidden">
    <!-- Toolbar -->
    <div class="h-14 bg-gray-900 border-b border-gray-700 flex items-center justify-between px-4">
        <div class="flex items-center gap-3">
            <a href="/" class="text-gray-400 hover:text-white text-sm font-medium">ScriptHut</a>
            <span class="text-gray-600">|</span>
            <span class="text-gray-300 text-sm font-medium" id="session-label">
                {{ backend_name }} ({{ host }})
            </span>
            <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-500" title="Connecting..."></span>
            <span id="status-text" class="text-xs text-yellow-500">Connecting...</span>
        </div>
        <div class="flex items-center gap-2">
            <!-- Job connect controls (hidden by default, shown when session_type=job) -->
            <div id="job-controls" class="hidden flex items-center gap-2">
                <button id="continue-btn" onclick="sendContinueSignal()"
                    class="text-xs px-3 py-1.5 bg-orange-600 hover:bg-orange-500 rounded text-white font-medium"
                    title="Send continue signal to unblock the job's main command">
                    Continue Job
                </button>
            </div>
            <button onclick="window.close()"
                class="text-xs px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-gray-300">
                Close
            </button>
        </div>
    </div>

    <!-- Terminal -->
    <div id="terminal-container"></div>

    <script>
        const BACKEND_NAME = "{{ backend_name }}";

        // Parse URL params for session config
        const params = new URLSearchParams(window.location.search);
        const sessionType = params.get("session_type") || "headnode";
        let jobNode = params.get("node") || "";
        let jobId = params.get("job_id") || "";

        // Interactive submit mode: submit task first, then wait for it
        const submitRunId = params.get("run_id") || "";
        const submitTaskId = params.get("task_id") || "";

        // Show job controls for job sessions
        if (sessionType === "job") {
            document.getElementById("job-controls").classList.remove("hidden");
            if (jobNode) {
                document.getElementById("session-label").textContent =
                    `${BACKEND_NAME} - Job ${jobId} on ${jobNode}`;
            } else {
                document.getElementById("session-label").textContent =
                    `${BACKEND_NAME} - Interactive job (submitting...)`;
            }
        } else if (sessionType === "attach") {
            if (jobNode) {
                document.getElementById("session-label").textContent =
                    `${BACKEND_NAME} - ${jobNode}`;
            }
        }

        // Create terminal
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, Monaco, monospace",
            theme: {
                background: '#1a1b26',
                foreground: '#c0caf5',
                cursor: '#c0caf5',
                selectionBackground: '#33467c',
                black: '#15161e',
                red: '#f7768e',
                green: '#9ece6a',
                yellow: '#e0af68',
                blue: '#7aa2f7',
                magenta: '#bb9af7',
                cyan: '#7dcfff',
                white: '#a9b1d6',
            },
            scrollback: 10000,
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(webLinksAddon);

        term.open(document.getElementById("terminal-container"));
        fitAddon.fit();

        // WebSocket connection
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${proto}//${window.location.host}/ws/terminal/${BACKEND_NAME}`;
        let ws = null;
        let connected = false;

        function setStatus(color, text) {
            const dot = document.getElementById("status-dot");
            const label = document.getElementById("status-text");
            dot.className = `w-2.5 h-2.5 rounded-full bg-${color}-500`;
            label.className = `text-xs text-${color}-500`;
            label.textContent = text;
        }

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = function () {
                // Send init message with terminal dimensions and session config
                const initMsg = {
                    type: "init",
                    cols: term.cols,
                    rows: term.rows,
                    session_type: sessionType,
                    node: jobNode,
                    job_id: jobId,
                };
                ws.send(JSON.stringify(initMsg));
                connected = true;
                setStatus("green", "Connected");
            };

            ws.onmessage = function (event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "output") {
                        term.write(msg.data);
                    } else if (msg.type === "error") {
                        term.write(`\r\n\x1b[31mError: ${msg.message}\x1b[0m\r\n`);
                        setStatus("red", "Error");
                    } else if (msg.type === "exit") {
                        term.write(`\r\n\x1b[33m[Session ended (exit code: ${msg.code})]\x1b[0m\r\n`);
                        setStatus("gray", "Disconnected");
                        connected = false;
                    }
                } catch (e) {
                    // Raw text fallback
                    term.write(event.data);
                }
            };

            ws.onclose = function () {
                if (connected) {
                    term.write("\r\n\x1b[33m[Connection closed]\x1b[0m\r\n");
                    setStatus("gray", "Disconnected");
                    connected = false;
                }
            };

            ws.onerror = function () {
                setStatus("red", "Connection error");
            };
        }

        // Forward terminal input to WebSocket
        term.onData(function (data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "input", data: data }));
            }
        });

        // Handle terminal resize
        term.onResize(function (size) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "resize", cols: size.cols, rows: size.rows }));
            }
        });

        // Refit on window resize
        window.addEventListener("resize", function () {
            fitAddon.fit();
        });

        // Send continue signal to unblock the job
        function sendContinueSignal() {
            if (!jobId) return;
            const btn = document.getElementById("continue-btn");
            btn.textContent = "Sending...";
            btn.disabled = true;

            fetch(`/terminal/jobs/${BACKEND_NAME}/${jobId}/continue`, { method: "POST" })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        btn.textContent = "Failed";
                        btn.classList.replace("bg-orange-600", "bg-red-600");
                        term.write(`\r\n\x1b[31m[Continue failed: ${data.error}]\x1b[0m\r\n`);
                    } else {
                        btn.textContent = "Sent!";
                        btn.classList.replace("bg-orange-600", "bg-green-600");
                        term.write("\r\n\x1b[32m[Continue signal sent - job will proceed]\x1b[0m\r\n");
                    }
                    setTimeout(() => {
                        btn.textContent = "Continue Job";
                        btn.disabled = false;
                        btn.className = "text-xs px-3 py-1.5 bg-orange-600 hover:bg-orange-500 rounded text-white font-medium";
                    }, 3000);
                })
                .catch(() => {
                    btn.textContent = "Continue Job";
                    btn.disabled = false;
                });
        }

        // ── Startup flow ───────────────────────────────────────────────
        async function start() {
            if (sessionType === "headnode" || sessionType === "attach") {
                // Simple shell — connect immediately (attach sends node in init)
                connect();
                return;
            }

            // Job session: may need to submit first and/or wait for node
            if (submitRunId && submitTaskId && !jobId) {
                // Step 1: submit the task with interactive_wait
                setStatus("yellow", "Submitting job...");
                term.write("\x1b[33mSubmitting interactive job...\x1b[0m\r\n");
                try {
                    const resp = await fetch(
                        `/terminal/interactive/${BACKEND_NAME}/${submitRunId}/${submitTaskId}`,
                        { method: "POST" }
                    );
                    const data = await resp.json();
                    if (data.error) {
                        term.write(`\x1b[31mSubmit failed: ${data.error}\x1b[0m\r\n`);
                        setStatus("red", "Submit failed");
                        return;
                    }
                    jobId = data.job_id;
                    term.write(`\x1b[32mJob submitted: ${jobId}\x1b[0m\r\n`);
                    document.getElementById("session-label").textContent =
                        `${BACKEND_NAME} - Job ${jobId} (waiting for node...)`;
                } catch (e) {
                    term.write(`\x1b[31mSubmit error: ${e}\x1b[0m\r\n`);
                    setStatus("red", "Submit error");
                    return;
                }
            }

            if (jobId && !jobNode) {
                // Step 2: poll until the job is running and we know the node
                setStatus("yellow", "Waiting for job...");
                term.write("\x1b[33mWaiting for job to start running...\x1b[0m\r\n");
                const node = await waitForJobNode(jobId);
                if (!node) {
                    term.write("\x1b[31mTimed out waiting for job to start.\x1b[0m\r\n");
                    setStatus("red", "Timeout");
                    return;
                }
                jobNode = node;
                document.getElementById("session-label").textContent =
                    `${BACKEND_NAME} - Job ${jobId} on ${jobNode}`;
                term.write(`\x1b[32mJob running on ${jobNode} — connecting to tmux...\x1b[0m\r\n\r\n`);

                // Small delay to give tmux time to start inside the job
                await new Promise(r => setTimeout(r, 2000));
            }

            // Step 3: connect WebSocket to the running job's tmux
            connect();
        }

        async function waitForJobNode(id, maxAttempts = 60) {
            for (let i = 0; i < maxAttempts; i++) {
                try {
                    const resp = await fetch(`/terminal/jobs/${BACKEND_NAME}/${id}/status`);
                    const data = await resp.json();
                    if (data.node) return data.node;
                    if (data.state === "error") return null;
                    // Show a dot for each poll
                    term.write(".");
                } catch (e) {
                    // ignore transient errors
                }
                await new Promise(r => setTimeout(r, 5000));
            }
            return null;
        }

        start();
    </script>
</body>

</html>
